<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计算器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .calculator { background: rgba(255, 255, 255, 0.95); border-radius: 20px; padding: 25px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); width: 100%; max-width: 400px; }
        .display { background: #f8f9fa; border-radius: 15px; padding: 20px; margin-bottom: 20px; text-align: right; min-height: 100px; display: flex; flex-direction: column; justify-content: flex-end; }
        .previous-operand { color: #6c757d; font-size: 18px; min-height: 25px; word-break: break-all; }
        .current-operand { color: #212529; font-size: 42px; font-weight: 600; word-break: break-all; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        button { border: none; border-radius: 15px; padding: 20px; font-size: 24px; cursor: pointer; transition: all 0.2s ease; font-weight: 500; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2); }
        button:active { transform: translateY(0); }
        .number { background: #e9ecef; color: #212529; }
        .number:hover { background: #dee2e6; }
        .operator { background: #667eea; color: white; }
        .operator:hover { background: #5a67d8; }
        .equals { background: #764ba2; color: white; grid-column: span 2; }
        .equals:hover { background: #6a4190; }
        .clear { background: #dc3545; color: white; }
        .clear:hover { background: #c82333; }
        .delete { background: #6c757d; color: white; }
        .delete:hover { background: #5a6268; }
        .zero { grid-column: span 2; }
        @media (max-width: 480px) { .calculator { padding: 15px; } button { padding: 15px; font-size: 20px; } .current-operand { font-size: 36px; } }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="previous-operand" id="previousOperand"></div>
            <div class="current-operand" id="currentOperand">0</div>
        </div>
        <div class="buttons">
            <button class="clear" onclick="clearAll()">AC</button>
            <button class="delete" onclick="deleteNumber()">DEL</button>
            <button class="operator" onclick="chooseOperation('%')">%</button>
            <button class="operator" onclick="chooseOperation('÷')">÷</button>
            <button class="number" onclick="appendNumber('7')">7</button>
            <button class="number" onclick="appendNumber('8')">8</button>
            <button class="number" onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="chooseOperation('×')">×</button>
            <button class="number" onclick="appendNumber('4')">4</button>
            <button class="number" onclick="appendNumber('5')">5</button>
            <button class="number" onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="chooseOperation('-')">-</button>
            <button class="number" onclick="appendNumber('1')">1</button>
            <button class="number" onclick="appendNumber('2')">2</button>
            <button class="number" onclick="appendNumber('3')">3</button>
            <button class="operator" onclick="chooseOperation('+')">+</button>
            <button class="number zero" onclick="appendNumber('0')">0</button>
            <button class="number" onclick="appendNumber('.')">.</button>
            <button class="equals" onclick="calculate()">=</button>
        </div>
    </div>
    <script>
        let currentOperand = '0', previousOperand = '', operation = undefined;
        function updateDisplay() {
            document.getElementById('currentOperand').textContent = currentOperand;
            document.getElementById('previousOperand').textContent = operation != null ? previousOperand + ' ' + operation : previousOperand;
        }
        function appendNumber(number) {
            if (number === '.' && currentOperand.includes('.')) return;
            currentOperand = (currentOperand === '0' && number !== '.') ? number : currentOperand + number;
            updateDisplay();
        }
        function chooseOperation(op) {
            if (currentOperand === '') return;
            if (previousOperand !== '') calculate();
            operation = op; previousOperand = currentOperand; currentOperand = '0';
            updateDisplay();
        }
        function calculate() {
            const prev = parseFloat(previousOperand), current = parseFloat(currentOperand);
            if (isNaN(prev) || isNaN(current)) return;
            var computation;
            switch (operation) {
                case '+': computation = prev + current; break;
                case '-': computation = prev - current; break;
                case '×': computation = prev * current; break;
                case '÷': if (current === 0) { alert('不能除以0！'); return; } computation = prev / current; break;
                case '%': computation = prev % current; break;
                default: return;
            }
            currentOperand = computation.toString(); operation = undefined; previousOperand = ''; updateDisplay();
        }
        function clearAll() { currentOperand = '0'; previousOperand = ''; operation = undefined; updateDisplay(); }
        function deleteNumber() { currentOperand = currentOperand.length === 1 ? '0' : currentOperand.slice(0, -1); updateDisplay(); }
        document.addEventListener('keydown', function(e) {
            if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
            if (e.key === '.') appendNumber('.');
            if (e.key === '+') chooseOperation('+');
            if (e.key === '-') chooseOperation('-');
            if (e.key === '*') chooseOperation('×');
            if (e.key === '/') chooseOperation('÷');
            if (e.key === '%') chooseOperation('%');
            if (e.key === 'Enter' || e.key === '=') { e.preventDefault(); calculate(); }
            if (e.key === 'Escape') clearAll();
            if (e.key === 'Backspace') { e.preventDefault(); deleteNumber(); }
        });
        updateDisplay();
    </script>
</body>
</html>
