<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }
        h1 {
            color: rgba(255,255,255,0.95);
            font-size: 1.5rem;
            margin-bottom: 32px;
            font-weight: 600;
        }
        .cards {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 480px;
        }
        .card {
            display: block;
            width: 100%;
            max-width: 220px;
            padding: 28px 24px;
            border-radius: 16px;
            text-decoration: none;
            color: inherit;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            background: rgba(255,255,255,0.95);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.25);
        }
        .card .title { font-size: 1.25rem; font-weight: 600; color: #1a1a2e; margin-bottom: 8px; }
        .card .desc { font-size: 0.9rem; color: #555; }
        .card.calc { border-top: 4px solid #667eea; }
        .card.naming { border-top: 4px solid #8b2942; }
    </style>
</head>
<body>
    <h1>请选择</h1>
    <div class="cards">
        <a href="calculator.html" class="card calc">
            <div class="title">计算器</div>
            <div class="desc">加减乘除、取余，支持键盘</div>
        </a>
        <a href="naming/" class="card naming">
            <div class="title">起名</div>
            <div class="desc">按姓氏、生辰与对话生成名字备选</div>
        </a>
    </div>
</body>
</html>
