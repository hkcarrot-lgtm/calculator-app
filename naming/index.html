<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>起名 · 承古启今</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --朱红: #8b2942;
            --朱红浅: #a83d52;
            --金: #c9a227;
            --墨: #2c2416;
            --宣纸: #f7f2e8;
            --宣纸深: #ebe4d6;
            --五行木: #3d5c2e;
            --五行火: #8b2942;
            --五行土: #b8860b;
            --五行金: #6b6b6b;
            --五行水: #2e4a6b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html {
            min-height: 100%;
            min-height: -webkit-fill-available;
            overflow-x: hidden;
        }
        body {
            font-family: 'Noto Serif SC', 'KaiTi', '楷体', 'SimSun', serif;
            background: linear-gradient(180deg, #1a1510 0%, #2c2416 30%, #3d3428 100%);
            min-height: 100vh;
            min-height: 100dvh;
            min-height: -webkit-fill-available;
            color: var(--墨);
            padding: 20px;
            padding-left: max(20px, env(safe-area-inset-left));
            padding-right: max(20px, env(safe-area-inset-right));
            padding-top: max(20px, env(safe-area-inset-top));
            padding-bottom: max(20px, env(safe-area-inset-bottom));
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        .wrap {
            max-width: 520px;
            width: 100%;
            margin: 0 auto;
            background: var(--宣纸);
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            border: 1px solid rgba(201, 162, 39, 0.3);
            overflow: hidden;
            overflow-x: hidden;
        }
        .header {
            position: relative;
            background: linear-gradient(135deg, var(--朱红) 0%, #6b1f32 100%);
            color: var(--金);
            padding: 24px 20px;
            padding-top: 36px;
            text-align: center;
            border-bottom: 2px solid var(--金);
        }
        .header-nav {
            position: absolute;
            top: 10px;
            right: 12px;
            font-size: 12px;
            opacity: 0.9;
        }
        .header-nav a { color: inherit; text-decoration: none; }
        .header h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: 0.2em; }
        .header .sub { font-size: 0.75rem; opacity: 0.9; margin-top: 6px; letter-spacing: 0.3em; }
        .干支纹 {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            margin-top: 10px;
            font-size: 0.7rem;
            opacity: 0.7;
        }
        .content { padding: 28px 24px; min-height: 360px; overflow-x: hidden; }
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.35s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .step-title {
            color: var(--朱红);
            font-size: 1rem;
            margin-bottom: 20px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--宣纸深);
            letter-spacing: 0.15em;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; color: var(--墨); font-size: 0.9rem; margin-bottom: 6px; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--宣纸深);
            border-radius: 6px;
            background: #fff;
            font-family: inherit;
            font-size: 16px; /* ≥16px 避免 iOS 微信内聚焦时自动放大 */
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--金);
            box-shadow: 0 0 0 2px rgba(201,162,39,0.2);
        }
        .性别选 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .性别选 button {
            padding: 20px;
            min-height: 48px; /* iOS 触控区域 ≥44px */
            border: 2px solid var(--宣纸深);
            border-radius: 8px;
            background: #fff;
            font-family: inherit;
            font-size: 1.1rem;
            color: var(--墨);
            cursor: pointer;
            transition: all 0.2s;
        }
        .性别选 button:hover { border-color: var(--金); color: var(--朱红); }
        .性别选 button.selected { border-color: var(--朱红); background: rgba(139,41,66,0.08); color: var(--朱红); }
        .生辰行 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }
        .生辰行.full { grid-template-columns: 1fr 1fr; }
        .btn-primary {
            width: 100%;
            padding: 14px;
            min-height: 48px;
            margin-top: 10px;
            border: none;
            border-radius: 6px;
            background: linear-gradient(180deg, var(--朱红) 0%, #6b1f32 100%);
            color: #fff;
            font-family: inherit;
            font-size: 16px;
            cursor: pointer;
            letter-spacing: 0.1em;
        }
        .btn-primary:hover { background: linear-gradient(180deg, var(--朱红浅) 0%, var(--朱红) 100%); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        /* 对话步骤 */
        .chat-container {
            max-height: min(380px, 50vh);
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 4px;
            -webkit-overflow-scrolling: touch;
            width: 100%;
        }
        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: var(--宣纸深); border-radius: 3px; }
        .msg { margin-bottom: 16px; display: flex; gap: 10px; }
        .msg.agent { flex-direction: row; }
        .msg.user { flex-direction: row-reverse; }
        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            color: #fff;
        }
        .msg.agent .msg-avatar { background: var(--朱红); }
        .msg.user .msg-avatar { background: var(--五行水); }
        .msg-bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .msg.agent .msg-bubble { background: var(--宣纸深); color: var(--墨); border-bottom-left-radius: 4px; }
        .msg.user .msg-bubble { background: rgba(139,41,66,0.12); color: var(--墨); border-bottom-right-radius: 4px; }
        .chat-input-wrap {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            width: 100%;
            min-width: 0;
        }
        .chat-input-wrap input {
            flex: 1 1 auto;
            min-width: 0;
            padding: 12px 14px;
            min-height: 44px;
            border: 1px solid var(--宣纸深);
            border-radius: 8px;
            font-family: inherit;
            font-size: 16px;
        }
        .chat-input-wrap input:focus { outline: none; border-color: var(--金); }
        .chat-input-wrap button {
            flex-shrink: 0;
            padding: 12px 16px;
            min-height: 44px;
            border: none;
            border-radius: 8px;
            background: var(--朱红);
            color: #fff;
            font-family: inherit;
            font-size: 16px;
            cursor: pointer;
        }
        .chat-input-wrap button:hover { background: var(--朱红浅); }
        .progress-dots { display: flex; justify-content: center; gap: 6px; margin-bottom: 12px; }
        .progress-dots span {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--宣纸深);
        }
        .progress-dots span.done { background: var(--金); }
        .progress-dots span.current { background: var(--朱红); }
        /* 结果步骤 */
        .result-cards { display: flex; flex-direction: column; gap: 16px; }
        .result-card {
            background: #fff;
            border: 1px solid var(--宣纸深);
            border-radius: 10px;
            padding: 18px;
            border-left: 4px solid var(--金);
        }
        .result-card .name { font-size: 1.4rem; color: var(--朱红); margin-bottom: 8px; letter-spacing: 0.2em; }
        .result-card .desc { font-size: 0.85rem; color: var(--墨); line-height: 1.75; }
        .more-feedback { margin-top: 20px; }
        .more-feedback textarea {
            width: 100%;
            min-height: 80px;
            padding: 12px;
            border: 1px solid var(--宣纸深);
            border-radius: 8px;
            font-family: inherit;
            font-size: 16px;
            resize: vertical;
        }
        .more-feedback textarea:focus { outline: none; border-color: var(--金); }
        .more-feedback .hint { font-size: 0.8rem; color: #888; margin-top: 6px; }
        .btn-secondary {
            padding: 10px 18px;
            margin-top: 10px;
            border: 1px solid var(--朱红);
            border-radius: 6px;
            background: transparent;
            color: var(--朱红);
            font-family: inherit;
            cursor: pointer;
        }
        .btn-secondary:hover { background: rgba(139,41,66,0.08); }
        .btn-secondary { min-height: 44px; }
        .footer-steps {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            padding-left: max(24px, env(safe-area-inset-left));
            padding-right: max(24px, env(safe-area-inset-right));
            padding-bottom: max(16px, env(safe-area-inset-bottom));
            border-top: 1px solid var(--宣纸深);
            background: rgba(0,0,0,0.02);
        }
        .footer-steps button {
            padding: 10px 16px;
            min-height: 44px;
            border: 1px solid var(--宣纸深);
            border-radius: 6px;
            background: #fff;
            font-family: inherit;
            font-size: 16px;
            color: var(--墨);
            cursor: pointer;
        }
        .footer-steps button:hover { border-color: var(--金); color: var(--朱红); }
        .hidden { display: none !important; }
        /* 微信内 & iPhone 12+ 竖屏适配 */
        @media (max-width: 430px) {
            body { padding: 10px; padding-left: max(10px, env(safe-area-inset-left)); padding-right: max(10px, env(safe-area-inset-right)); padding-top: max(10px, env(safe-area-inset-top)); padding-bottom: max(10px, env(safe-area-inset-bottom)); }
            .wrap { border-radius: 6px; }
            .header { padding: 32px 12px 16px; }
            .header-nav { right: 8px; font-size: 11px; }
            .header h1 { font-size: 1.25rem; letter-spacing: 0.1em; }
            .干支纹 { font-size: 0.65rem; gap: 4px; }
            .content { padding: 14px 12px; min-height: 280px; }
            .step-title { font-size: 0.95rem; margin-bottom: 14px; }
            .chat-container { max-height: min(300px, 42vh); }
            .chat-input-wrap { gap: 6px; }
            .chat-input-wrap button { padding: 12px 12px; }
            .msg-bubble { max-width: 92%; font-size: 0.9rem; }
        }
        @media (max-height: 700px) {
            .chat-container { max-height: 200px; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <header class="header">
            <p class="header-nav"><a href="../index.html">首页</a> · <a href="../calculator.html">计算器</a></p>
            <h1>起名</h1>
            <p class="sub">承古启今</p>
            <div class="干支纹" aria-hidden="true">甲 乙 丙 丁 戊 己 庚 辛 壬 癸 · 子 丑 寅 卯 辰 巳 午 未 申 酉 戌 亥</div>
        </header>
        <main class="content">
            <!-- 步骤一：姓 -->
            <section class="step active" id="step1" data-step="1">
                <h2 class="step-title">一、姓氏</h2>
                <div class="form-group">
                    <label for="surname">请输入孩子的姓氏（如：张、欧阳）</label>
                    <input type="text" id="surname" placeholder="例：李" maxlength="4" autocomplete="off" />
                </div>
                <button type="button" class="btn-primary" id="next1">下一步</button>
            </section>
            <!-- 步骤二：性别 -->
            <section class="step" id="step2" data-step="2">
                <h2 class="step-title">二、性别</h2>
                <div class="性别选">
                    <button type="button" data-gender="男" id="btnBoy">男孩</button>
                    <button type="button" data-gender="女" id="btnGirl">女孩</button>
                </div>
                <button type="button" class="btn-primary" id="next2" disabled>下一步</button>
            </section>
            <!-- 步骤三：生辰 -->
            <section class="step" id="step3" data-step="3">
                <h2 class="step-title">三、出生年月日时</h2>
                <div class="form-group">
                    <label>公历出生日期</label>
                    <div class="生辰行">
                        <input type="number" id="birthY" placeholder="年" min="1900" max="2100" />
                        <input type="number" id="birthM" placeholder="月" min="1" max="12" />
                        <input type="number" id="birthD" placeholder="日" min="1" max="31" />
                    </div>
                </div>
                <div class="form-group">
                    <label for="birthHour">出生时辰（可选，用于八字参考）</label>
                    <select id="birthHour">
                        <option value="">请选择时辰</option>
                        <option value="子">子时 23:00-01:00</option>
                        <option value="丑">丑时 01:00-03:00</option>
                        <option value="寅">寅时 03:00-05:00</option>
                        <option value="卯">卯时 05:00-07:00</option>
                        <option value="辰">辰时 07:00-09:00</option>
                        <option value="巳">巳时 09:00-11:00</option>
                        <option value="午">午时 11:00-13:00</option>
                        <option value="未">未时 13:00-15:00</option>
                        <option value="申">申时 15:00-17:00</option>
                        <option value="酉">酉时 17:00-19:00</option>
                        <option value="戌">戌时 19:00-21:00</option>
                        <option value="亥">亥时 21:00-23:00</option>
                    </select>
                </div>
                <button type="button" class="btn-primary" id="next3">下一步</button>
            </section>
            <!-- 步骤四：多轮对话 -->
            <section class="step" id="step4" data-step="4">
                <h2 class="step-title">四、心意与期望</h2>
                <p class="hint" style="margin-bottom:12px;font-size:0.85rem;color:#666;">与您聊几句，以便更贴合您的心意为您择名。</p>
                <div class="progress-dots" id="chatProgress"></div>
                <div class="chat-container" id="chatContainer"></div>
                <div class="chat-input-wrap" id="chatInputWrap">
                    <input type="text" id="chatInput" placeholder="请输入您的想法…" />
                    <button type="button" id="chatSend">发送</button>
                </div>
                <button type="button" class="btn-primary hidden" id="toResult">生成名字</button>
            </section>
            <!-- 步骤五：结果 -->
            <section class="step" id="step5" data-step="5">
                <h2 class="step-title">五、名字备选</h2>
                <div class="result-cards" id="resultCards"></div>
                <div class="more-feedback hidden" id="moreFeedback">
                    <label>若想获得更多备选，可说说这几位名字中不太满意的地方（选填）：</label>
                    <textarea id="feedbackText" placeholder="例如：不喜欢太柔的字、希望更大气一些…"></textarea>
                    <p class="hint">我们会根据您的反馈再为您斟酌新名；不填也可直接生成。</p>
                    <button type="button" class="btn-secondary" id="submitMore">再生成 3 个</button>
                </div>
                <p class="step-title hidden" id="moreResultTitle" style="margin-top:20px;">更多备选</p>
                <div id="moreResultCards" class="result-cards" style="margin-top:8px;"></div>
                <div style="margin-top:16px;display:flex;flex-wrap:wrap;gap:10px;">
                    <button type="button" class="btn-secondary" id="wantMore">想要更多备选</button>
                    <button type="button" class="btn-secondary" id="directMore">直接再生成 3 个</button>
                </div>
            </section>
        </main>
        <footer class="footer-steps" id="footerSteps">
            <button type="button" id="btnPrev">上一步</button>
            <span></span>
        </footer>
    </div>
    <script>
        const state = {
            step: 1,
            surname: '',
            gender: '',
            birthY: '', birthM: '', birthD: '', birthHour: '',
            chatRound: 0,
            answers: {},
            questionTopics: [
                { key: 'career', variants: [
                    '您心里有没有想过，孩子将来大致会从事哪一类事业？例如从文、从商、从艺、从医等，随便说说即可。',
                    '若可以畅想一下，您更希望孩子将来往哪个方向发展？文、理、艺、商都无妨，只是作个参考。',
                    '职业方面有偏好吗？比如偏文化、技术、艺术或经商，简单说一句就好。'
                ]},
                { key: 'nameLen', variants: [
                    '名字您更倾向两个字还是三个字？（单名二字，双名三字）',
                    '单名（姓+一字）和双名（姓+两字），您更中意哪种？',
                    '您打算起单名还是双名？'
                ]},
                { key: 'meaning', variants: [
                    '有没有特别希望名字里带出来的寓意？比如平安、聪慧、坚韧、清雅等。',
                    '寓意上有什么期待吗？平安、智慧、刚柔、雅正之类的都可以。',
                    '您希望名字在寓意上偏向哪一类？吉祥、才学、品格、意境都行。'
                ]},
                { key: 'favoriteChar', variants: [
                    '有没有对某个字特别钟意，想放进名字里的？',
                    '有没有特别喜欢的字，希望尽量用上的？',
                    '您或家人有没有想放进名字里的字？'
                ]},
                { key: 'personality', variants: [
                    '您希望孩子以后性格上更偏哪一类？例如沉稳、开朗、内敛、果敢等。',
                    '性格上您更希望孩子偏沉稳还是外向、内敛还是果敢？',
                    '对孩子性格的期待大概是怎样的？简单说一两个词即可。'
                ]},
                { key: 'avoid', variants: [
                    '有没有特别不希望孩子表现出的性格或行为？我们可以尽量在选字时避开相关意象。',
                    '有没有想尽量避免的意象或性格倾向？选字时可以留意。',
                    '名字里希望尽量避开哪种感觉或联想？'
                ]},
                { key: 'tone', variants: [
                    '名字读起来您更喜欢响亮一些，还是更温和、含蓄一些？',
                    '音韵上偏好响亮有力，还是温和好读？',
                    '读感上更喜欢大气响亮，还是柔和含蓄？'
                ]},
                { key: 'culture', variants: [
                    '是否希望名字里带一点古典、诗词或典故的韵味？',
                    '想不想名字带些书卷气或古典味？',
                    '古典、诗词感在您心里是加分项吗？'
                ]},
                { key: 'other', variants: [
                    '还有没有其他在意的点？例如谐音、笔画多少、与某位长辈避讳等，都可以说。',
                    '谐音、笔画、长辈避讳等方面还有要求吗？',
                    '除此之外还有没有要特别注意的？'
                ]}
            ],
            suggestedNames: [],
            moreSuggestedNames: [],
            dialogMessages: [],
            useDialogMode: false,
            maxDialogRounds: 14
        };

        const steps = [1, 2, 3, 4, 5];
        function showStep(n) {
            state.step = n;
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            const stepEl = document.getElementById('step' + n);
            if (stepEl) stepEl.classList.add('active');
            document.getElementById('btnPrev').style.visibility = n === 1 ? 'hidden' : 'visible';
        }

        document.getElementById('next1').onclick = () => {
            const s = (document.getElementById('surname').value || '').trim();
            if (!s) { alert('请输入姓氏'); return; }
            state.surname = s;
            showStep(2);
        };
        document.getElementById('btnBoy').onclick = () => { state.gender = '男'; document.querySelectorAll('.性别选 button').forEach(b => b.classList.remove('selected')); document.getElementById('btnBoy').classList.add('selected'); document.getElementById('next2').disabled = false; };
        document.getElementById('btnGirl').onclick = () => { state.gender = '女'; document.querySelectorAll('.性别选 button').forEach(b => b.classList.remove('selected')); document.getElementById('btnGirl').classList.add('selected'); document.getElementById('next2').disabled = false; };
        document.getElementById('next2').onclick = () => showStep(3);
        document.getElementById('next3').onclick = () => {
            const y = document.getElementById('birthY').value, m = document.getElementById('birthM').value, d = document.getElementById('birthD').value;
            if (!y || !m || !d) { alert('请填写出生年月日'); return; }
            state.birthY = y; state.birthM = m; state.birthD = d; state.birthHour = document.getElementById('birthHour').value || '';
            showStep(4);
            initChat();
        };

        document.getElementById('btnPrev').onclick = () => { if (state.step > 1) showStep(state.step - 1); };

        const 开场白 = [
            '您好。接下来会简单问您几个问题，方便我们更贴合您的心意为孩子择名。',
            '您好，为求名字更合您心意，需要向您请教几件事，咱们逐条聊。',
            '有劳您稍候。我们会问您几个小问题，以便择名时更贴您的想法。'
        ];

        function callKimi(action, payload) {
            return fetch('/api/kimi', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: action, payload: payload })
            }).then(function(r) {
                if (!r.ok) throw new Error(r.status);
                return r.json();
            }).then(function(data) {
                if (data.error) throw new Error(data.error);
                return data;
            });
        }

        function setLastAgentBubbleText(text) {
            var c = document.getElementById('chatContainer');
            var last = c && c.querySelector('.msg.agent:last-child .msg-bubble');
            if (last) last.innerHTML = escapeHtml(text);
            if (c) c.scrollTop = c.scrollHeight;
        }

        function getContext() {
            return {
                surname: state.surname,
                gender: state.gender,
                birthY: state.birthY,
                birthM: state.birthM,
                birthD: state.birthD,
                birthHour: state.birthHour || ''
            };
        }

        function showGenerateButton() {
            document.getElementById('chatInputWrap').classList.add('hidden');
            document.getElementById('toResult').classList.remove('hidden');
            var pr = document.getElementById('chatProgress');
            if (pr) pr.querySelectorAll('span').forEach(function(s) { s.classList.add('done'); });
        }

        function initChat() {
            var container = document.getElementById('chatContainer');
            var progress = document.getElementById('chatProgress');
            container.innerHTML = '';
            state.chatRound = 0;
            state.answers = {};
            state.dialogMessages = [];
            state.useDialogMode = true;
            var opening = 开场白[Math.floor(Math.random() * 开场白.length)];
            appendAgentMsg(opening);
            state.dialogMessages.push({ role: 'assistant', content: opening });
            progress.innerHTML = '';
            appendAgentMsg('思考中…');
            callKimi('chat', { messages: state.dialogMessages, context: getContext() })
                .then(function(data) {
                    var text = (data && data.text) ? data.text.trim() : '';
                    if (text.toUpperCase() === '[READY]') {
                        setLastAgentBubbleText('好的，信息已足够，可以为您生成名字了。');
                        showGenerateButton();
                        return;
                    }
                    if (text) {
                        setLastAgentBubbleText(text);
                        state.dialogMessages.push({ role: 'assistant', content: text });
                    } else {
                        setLastAgentBubbleText('请随意说说您对名字的期待，例如寓意、风格、字数等。');
                        state.dialogMessages.push({ role: 'assistant', content: '请随意说说您对名字的期待，例如寓意、风格、字数等。' });
                    }
                })
                .catch(function() {
                    setLastAgentBubbleText('请说说您对名字的期待（如寓意、字数、风格等），我们会根据您的回复继续聊。');
                    state.dialogMessages.push({ role: 'assistant', content: '请说说您对名字的期待（如寓意、字数、风格等），我们会根据您的回复继续聊。' });
                });
        }

        function appendAgentMsg(text) {
            const c = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = 'msg agent';
            div.innerHTML = '<div class="msg-avatar">师</div><div class="msg-bubble">' + escapeHtml(text) + '</div>';
            c.appendChild(div);
            c.scrollTop = c.scrollHeight;
        }

        function appendUserMsg(text) {
            const c = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = 'msg user';
            div.innerHTML = '<div class="msg-avatar">您</div><div class="msg-bubble">' + escapeHtml(text) + '</div>';
            c.appendChild(div);
            c.scrollTop = c.scrollHeight;
        }

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        document.getElementById('chatSend').onclick = sendChat;
        document.getElementById('chatInput').onkeydown = (e) => { if (e.key === 'Enter') sendChat(); };

        function sendChat() {
            var input = document.getElementById('chatInput');
            var text = (input.value || '').trim();
            if (!text) return;
            input.value = '';
            state.dialogMessages.push({ role: 'user', content: text });
            appendUserMsg(text);
            appendAgentMsg('思考中…');
            callKimi('chat', { messages: state.dialogMessages, context: getContext() })
                .then(function(data) {
                    var reply = (data && data.text) ? data.text.trim() : '';
                    if (reply.toUpperCase() === '[READY]') {
                        setLastAgentBubbleText('好的，信息已足够，可以为您生成名字了。');
                        showGenerateButton();
                        return;
                    }
                    var assistantCount = state.dialogMessages.filter(function(m) { return m.role === 'assistant'; }).length;
                    if (assistantCount >= state.maxDialogRounds) {
                        setLastAgentBubbleText('已了解不少您的想法，可以为您生成名字了。');
                        showGenerateButton();
                        return;
                    }
                    if (reply) {
                        setLastAgentBubbleText(reply);
                        state.dialogMessages.push({ role: 'assistant', content: reply });
                    } else {
                        setLastAgentBubbleText('请继续说说您的想法。');
                        state.dialogMessages.push({ role: 'assistant', content: '请继续说说您的想法。' });
                    }
                })
                .catch(function() {
                    setLastAgentBubbleText('请继续补充您的想法，或点击下方「生成名字」进入下一步。');
                    state.dialogMessages.push({ role: 'assistant', content: '请继续补充您的想法，或点击下方「生成名字」进入下一步。' });
                });
        }

        document.getElementById('toResult').onclick = function() {
            var btn = document.getElementById('toResult');
            var oldText = btn.textContent;
            btn.textContent = '生成中…';
            btn.disabled = true;
            var payload = {
                surname: state.surname,
                gender: state.gender,
                birthY: state.birthY,
                birthM: state.birthM,
                birthD: state.birthD,
                birthHour: state.birthHour || '',
                answers: state.answers,
                conversation: state.dialogMessages && state.dialogMessages.length ? state.dialogMessages : undefined
            };
            callKimi('names', payload).then(function(data) {
                if (data && data.names && Array.isArray(data.names) && data.names.length > 0) {
                    state.suggestedNames = data.names;
                } else {
                    state.suggestedNames = generateNames();
                }
                state.moreSuggestedNames = [];
                renderResults(state.suggestedNames, 'resultCards');
                document.getElementById('moreFeedback').classList.add('hidden');
                document.getElementById('moreResultCards').innerHTML = '';
                document.getElementById('moreResultTitle').classList.add('hidden');
                document.getElementById('wantMore').classList.remove('hidden');
                showStep(5);
            }).catch(function() {
                state.suggestedNames = generateNames();
                state.moreSuggestedNames = [];
                renderResults(state.suggestedNames, 'resultCards');
                document.getElementById('moreFeedback').classList.add('hidden');
                document.getElementById('moreResultCards').innerHTML = '';
                document.getElementById('moreResultTitle').classList.add('hidden');
                document.getElementById('wantMore').classList.remove('hidden');
                showStep(5);
            }).then(function() {
                btn.textContent = oldText;
                btn.disabled = false;
            });
        };

        var 五行名 = ['木','火','土','金','水'];
        var 五行相生 = { 木: '火', 火: '土', 土: '金', 金: '水', 水: '木' };
        var 五行相克 = { 木: '土', 土: '水', 水: '火', 火: '金', 金: '木' };
        var 字库 = {
            男: ['睿','轩','宇','涵','浩','梓','辰','泽','俊','博','毅','谦','朗','修','远','安','承','思','明','德'],
            女: ['怡','欣','妍','涵','雅','萱','琳','雨','馨','悦','婉','瑶','慧','静','舒','清','若','诗','韵','宁']
        };
        var 字五行 = {
            '睿':'水','轩':'土','宇':'土','涵':'水','浩':'水','梓':'木','辰':'土','泽':'水','俊':'火','博':'水','毅':'木','谦':'木','朗':'火','修':'金','远':'土','安':'土','承':'金','思':'金','明':'火','德':'火',
            '怡':'土','欣':'木','妍':'水','雅':'木','萱':'木','琳':'木','雨':'水','馨':'金','悦':'金','婉':'土','瑶':'火','慧':'水','静':'金','舒':'金','清':'水','若':'木','诗':'金','韵':'土','宁':'火'
        };
        var 寓意 = ['聪慧明理','温润如玉','志存高远','安然喜乐','德才兼备','清雅脱俗','坚韧豁达','承古启今'];

        function 生辰五行() {
            var y = parseInt(state.birthY, 10) || 0, m = parseInt(state.birthM, 10) || 0, d = parseInt(state.birthD, 10) || 0;
            var 天干序 = (y - 4) % 10; if (天干序 < 0) 天干序 += 10;
            var 年五行 = ['木','木','火','火','土','土','金','金','水','水'][天干序];
            var 时支 = state.birthHour || '';
            var 时五行 = { '子':'水','丑':'土','寅':'木','卯':'木','辰':'土','巳':'火','午':'火','未':'土','申':'金','酉':'金','戌':'土','亥':'水' }[时支] || '';
            var 日主 = 五行名[(y + m + d) % 5];
            return { 年: 年五行, 时: 时五行, 日主: 日主, 有时辰: !!时支 };
        }

        function buildDetailDesc(fullName) {
            var 名 = fullName.slice(state.surname.length);
            var 八字 = 生辰五行();
            var lines = [];
            if (state.birthY && state.birthM && state.birthD) {
                lines.push('【生辰】' + state.birthY + '年' + state.birthM + '月' + state.birthD + '日' + (state.birthHour ? ' ' + state.birthHour + '时' : ''));
                lines.push('【八字五行】年柱偏' + 八字.年 + '，日主属' + 八字.日主 + (八字.有时辰 ? '，时支为' + 八字.时 : '') + '。');
            }
            var 名字五行 = [];
            for (var i = 0; i < 名.length; i++) {
                var c = 名[i];
                var w = 字五行[c] || 五行名[名.charCodeAt(i) % 5];
                名字五行.push(c + '属' + w);
            }
            if (名字五行.length) {
                lines.push('【名字五行】' + 名字五行.join('、') + '。');
                var 与日主 = [];
                for (var j = 0; j < 名.length; j++) {
                    var w = 字五行[名[j]] || 五行名[名.charCodeAt(j) % 5];
                    if (五行相生[八字.日主] === w) 与日主.push(名[j] + '与日主' + 八字.日主 + '相生');
                    else if (五行相生[w] === 八字.日主) 与日主.push(名[j] + '得日主' + 八字.日主 + '相生');
                    else if (五行相克[w] === 八字.日主) 与日主.push(名[j] + '与日主' + 八字.日主 + '有克，宜慎');
                    else if (五行相克[八字.日主] === w) 与日主.push(名[j] + '克日主，可作调候');
                }
                if (与日主.length) lines.push('【与八字】' + 与日主.join('；') + '。');
            }
            var 寓意句 = 寓意[Math.floor(Math.random() * 寓意.length)];
            if (state.answers.meaning) 寓意句 += '，寓意呼应「' + state.answers.meaning + '」';
            if (state.answers.personality) 寓意句 += '，气质偏' + state.answers.personality;
            lines.push('【寓意】' + 寓意句 + '。');
            return lines.join('\n');
        }

        function generateNames() {
            var 姓 = state.surname;
            var 性别 = state.gender === '男' ? '男' : '女';
            var 字 = 字库[性别] || 字库['男'];
            var len = (state.answers.nameLen || '').indexOf('三') >= 0 ? 2 : 1;
            var used = {};
            var out = [];
            for (var i = 0; i < 3; i++) {
                var 名 = '';
                var n = len === 2 ? 2 : 1;
                while (n--) {
                    var idx = Math.floor(Math.random() * 字.length);
                    名 += 字[idx];
                }
                var full = 姓 + 名;
                if (used[full]) { i--; continue; }
                used[full] = true;
                out.push({ name: full, desc: buildDetailDesc(full) });
            }
            return out;
        }

        function renderResults(list, containerId) {
            var el = document.getElementById(containerId);
            el.innerHTML = list.map(function(item) {
                var desc = item.desc.replace(/\n/g, '<br>');
                return '<div class="result-card"><div class="name">' + escapeHtml(item.name) + '</div><div class="desc">' + desc + '</div></div>';
            }).join('');
        }

        document.getElementById('wantMore').onclick = function() {
            document.getElementById('moreFeedback').classList.remove('hidden');
            document.getElementById('feedbackText').value = '';
        };

        function doGenerateMore(feedback, fromForm) {
            var btn = fromForm ? document.getElementById('submitMore') : document.getElementById('directMore');
            var oldText = btn.textContent;
            btn.textContent = '生成中…';
            btn.disabled = true;
            var payload = {
                surname: state.surname,
                gender: state.gender,
                birthY: state.birthY,
                birthM: state.birthM,
                birthD: state.birthD,
                birthHour: state.birthHour || '',
                answers: state.answers,
                feedback: feedback || '',
                conversation: state.dialogMessages && state.dialogMessages.length ? state.dialogMessages : undefined
            };
            callKimi('names', payload).then(function(data) {
                var extra = (data && data.names && Array.isArray(data.names) && data.names.length > 0)
                    ? data.names
                    : generateNames();
                state.moreSuggestedNames = (state.moreSuggestedNames || []).concat(extra);
                renderResults(state.moreSuggestedNames, 'moreResultCards');
                document.getElementById('moreResultTitle').classList.remove('hidden');
                if (fromForm) {
                    document.getElementById('moreFeedback').classList.add('hidden');
                    document.getElementById('feedbackText').value = '';
                }
            }).catch(function() {
                var extra = generateNames();
                state.moreSuggestedNames = (state.moreSuggestedNames || []).concat(extra);
                renderResults(state.moreSuggestedNames, 'moreResultCards');
                document.getElementById('moreResultTitle').classList.remove('hidden');
                if (fromForm) {
                    document.getElementById('moreFeedback').classList.add('hidden');
                    document.getElementById('feedbackText').value = '';
                }
            }).then(function() {
                btn.textContent = oldText;
                btn.disabled = false;
            });
        }

        document.getElementById('submitMore').onclick = function() {
            var feedback = (document.getElementById('feedbackText').value || '').trim();
            doGenerateMore(feedback, true);
        };

        document.getElementById('directMore').onclick = function() {
            doGenerateMore('', false);
        };
    </script>
</body>
</html>
